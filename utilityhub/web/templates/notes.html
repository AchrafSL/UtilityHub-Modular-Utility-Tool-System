{% extends "layout.html" %}
{% block body %}








<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">

                <div
                    class="card-header bg-dark text-white border-bottom border-secondary d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Notes</h5>
                    <a href="/Notes/new" class="btn btn-primary btn-sm">+ New note</a>
                </div>

                {% if error %}
                <div class="alert alert-danger" id="ERROR" role="alert">
                    {{ error }}
                </div>
                <script>
                    setTimeout(() => {
                        const alert = new bootstrap.Alert(document.getElementById('ERROR'));
                        alert.close();
                    }, 3000);
                </script>
                {% endif %}

                <div class="card-body p-4">

                    <!-- Search + Filters -->
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
                        <form action="/Notes" method="POST" id="searchForm">
                            <input type="text" class="form-control w-auto" placeholder="Search title or content…"
                                name="q" value="{{ keyword if keyword else ''}}" id="searchInput" />

                        </form>


                        <a href="/Notes?tag=All"
                            class="btn btn-sm rounded-pill {% if tag == 'All' %}btn-primary{% else %}btn-outline-secondary{% endif %}">All</a>
                        <a href="/Notes?tag=General"
                            class="btn btn-sm rounded-pill {% if tag == 'General' %}btn-primary{% else %}btn-outline-secondary{% endif %}">General</a>
                        <a href="/Notes?tag=Work"
                            class="btn btn-sm rounded-pill {% if tag == 'Work' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Work</a>
                        <a href="/Notes?tag=Dev"
                            class="btn btn-sm rounded-pill {% if tag == 'Dev' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Dev</a>
                        <a href="/Notes?tag=Reading"
                            class="btn btn-sm rounded-pill {% if tag == 'Reading' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Reading</a>
                        <a href="/Notes?tag=Personal"
                            class="btn btn-sm rounded-pill {% if tag == 'Personal' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Personal</a>
                        <span class="ms-auto text-secondary small">{{ notes_count }}
                            notes</span>
                    </div>

                    <!-- Notes Grid -->
                    <div class="row g-3">
                        {% for note, snippet, color in data %}
                        <div class="col-md-6 ">

                            <form action="/Notes/modify/{{ note.Id }}" method="POST">
                                <div class=" card h-100 note-item" style="cursor: pointer;"
                                    onclick="this.querySelector('.create_note').click()">

                                    <div class="card-body note-item d-flex flex-column">
                                        <h6 class="card-title fw-semibold">{{ note.Title }}</h6>
                                        <p class="card-text text-secondary small flex-grow-1">{{ snippet }}</p>
                                        <div class="d-flex justify-content-between align-items-center mt-2">
                                            <small class="text-secondary">{{ note.Created_At }}</small>
                                            <span class="badge " style="background-color: {{ color }};">{{ note.Tag
                                                }}</span>
                                        </div>
                                        <input type="submit" class="btn btn-primary create_note" value="Create note"
                                            hidden>
                                    </div>
                                </div>
                            </form>

                        </div>
                        {% endfor %}






                    </div>

                </div>
            </div>
        </div>
    </div>

    {% endblock %}
