{% extends "layout.html" %}
{% block body %}

<div class="container py-5">
    <div class="card bg-dark border-secondary">
        <div class="card-header border-secondary text-light d-flex justify-content-between align-items-center">
            All actions
            <form action="/History/clear" method="POST" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-danger">
                    Clear all
                </button>
            </form>
        </div>

        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr class="text-secondary small">
                        <th>SERVICE</th>
                        <th>REQUEST</th>
                        <th>RESPONSE</th>
                        <th>DATETIME</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item,colors in data %}
                    <tr>
                        <td><span class="badge" style="background-color:{{ colors[0] }}; color:{{ colors[1] }};">{{
                                item.Tool
                                }}</span>
                        </td>
                        <td class="font-monospace">{{ item.Request }}</td>
                        <td>{{ item.Response }}</td>
                        <td class="text-nowrap">{{ item.Date }}</td>
                    </tr>
                    {% endfor %}

                    {% if not data %}
                    <tr>
                        <td colspan="4" class="text-center text-secondary py-4">
                            No history records found.
                        </td>
                    </tr>
                    {% endif %}

                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
