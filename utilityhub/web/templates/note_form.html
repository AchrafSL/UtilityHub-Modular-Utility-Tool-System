{% extends "layout.html" %}
{% block body %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">

                <div
                    class="card-header bg-dark text-white border-bottom border-secondary d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">{{ "Edit Note" if data else "New Note" }}</h5>
                    <div class="d-flex gap-2">
                        {% if data %}
                        <form action="/Notes/delete/{{ data.Id }}" method="POST">
                            <button type=" submit" class="btn btn-outline-danger btn-sm"> Delete </button>
                        </form>
                        {% endif %}
                        <a href="/Notes" class="btn btn-outline-secondary btn-sm">← Back</a>
                    </div>

                </div>

                <div class="card-body p-4">
                    <form action="{% if data %}/Notes/update/{{ data.Id }}{% else %}/Notes/create{% endif %}"
                        method="POST">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" placeholder="Note title" value="{{
                                data.Title if data else '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tag</label>
                            <select name="Tag" class="form-select">
                                <option value="General" {% if data and data.Tag=='General' %}selected{% endif %}>General
                                </option>
                                <option value="Work" {% if data and data.Tag=='Work' %}selected{% endif %}>Work</option>
                                <option value="Dev" {% if data and data.Tag=='Dev' %}selected{% endif %}>Dev</option>
                                <option value="Reading" {% if data and data.Tag=='Reading' %}selected{% endif %}>Reading
                                </option>
                                <option value="Personal" {% if data and data.Tag=='Personal' %}selected{% endif %}>
                                    Personal
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Content</label>
                            <textarea name="content" class="form-control" rows="8"
                                placeholder="Write your note here…">{{ data.Content if data else '' }}</textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="/Notes" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary"> {{ "Modify Note" if data else "Create Note"
                                }}
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
